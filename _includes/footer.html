  <script id="seguridad_curso">

/* verificar login */

if(localStorage.getItem("cursoLogin") !== "true"){
    window.location.href="/login";
}

/* obtener progreso */

let progreso = JSON.parse(localStorage.getItem("cursoProgreso") || "{}");

function completarLeccion(id){

    progreso[id] = true;

    localStorage.setItem("cursoProgreso", JSON.stringify(progreso));

}

/* verificar acceso */

function verificarAcceso(idAnterior){

    if(idAnterior && !progreso[idAnterior]){

        document.body.innerHTML="<h2 style='text-align:center;margin-top:100px;'>Debes completar la lección anterior</h2>";

    }

}

</script>
